<solar_accesories.html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Premium | BAJA PRO SERVICES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .hero-mini {
            height: 300px;
            background-image: ('hero.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .hero-gradient {
            background: linear-gradient(180deg, rgba(2, 6, 23, 0.4) 0%, rgba(2, 6, 23, 1) 100%);
        }

        .promo-pill {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            @apply text-slate-900 text-[10px] font-black px-4 py-1 rounded-full uppercase tracking-widest shadow-lg;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            @apply transition-all duration-300;
        }

        .product-card:hover {
            @apply border-amber-400/50 transform -translate-y-2;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .input-premium {
            @apply bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-400 transition-all;
        }

        .cart-footer {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 antialiased pb-44">

    <header class="hero-mini">
        <div class="absolute inset-0 hero-gradient"></div>
        <div class="relative h-full container mx-auto px-4 flex flex-col justify-center items-center text-center">
            <div class="promo-pill mb-4 animate-bounce">10% OFF HASTA JUNIO 30</div>
            <h1 class="text-3xl md:text-5xl font-black text-white tracking-tighter uppercase">
                Sistemas <span class="text-amber-400">Solares</span>
            </h1>
            <p class="text-slate-400 mt-2 text-sm max-w-md italic">Catálogo oficial de componentes de alta eficiencia.</p>
        </div>
    </header>

    <main class="container mx-auto px-4 -mt-10 relative z-10">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-12">
            <div class="lg:col-span-2 glass-card rounded-3xl p-6 grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="custName" placeholder="Nombre completo" class="input-premium">
                <input type="tel" id="custPhone" placeholder="WhatsApp" class="input-premium">
                <input type="text" id="custAddress" placeholder="Ciudad / Dirección" class="input-premium">
            </div>
            <div class="glass-card rounded-3xl p-6 flex items-center">
                <div class="relative w-full">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input type="text" id="searchBar" onkeyup="filter()" placeholder="Buscar equipo..." class="input-premium w-full pl-12">
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8" id="grid">
            </div>
    </main>

    <footer class="cart-footer fixed bottom-0 left-0 w-full z-50 py-6">
        <div class="container mx-auto px-4 flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-8">
                <div class="text-center md:text-left">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Equipos</p>
                    <p class="text-2xl font-black text-white" id="cartCount">0</p>
                </div>
                <div class="text-center md:text-left">
                    <p class="text-[10px] font-bold text-amber-400 uppercase tracking-widest italic">Ahorro Aplicado</p>
                    <p class="text-2xl font-black text-amber-400" id="cartSavings">$0.00</p>
                </div>
                <div class="text-center md:text-left">
                    <p class="text-[10px] font-bold text-green-400 uppercase tracking-widest">Total Neto</p>
                    <p class="text-2xl font-black text-green-400" id="cartTotal">$0.00</p>
                </div>
            </div>

            <div class="flex gap-4 w-full md:w-auto">
                <a href="index.html" class="flex-1 md:flex-none border border-slate-700 text-slate-400 font-bold px-6 py-4 rounded-2xl hover:bg-slate-800 transition-all flex items-center justify-center gap-2 text-xs uppercase">
                    <i class="fas fa-arrow-left"></i> Volver a Calculadora
                </a>
                <button id="sendWpp" onclick="sendToWhatsapp()" disabled class="flex-[2] md:flex-none bg-green-500 disabled:bg-slate-800 disabled:text-slate-600 hover:bg-green-400 text-slate-900 font-black px-10 py-4 rounded-2xl transition-all flex items-center justify-center gap-3 shadow-xl uppercase text-xs">
                    <i class="fab fa-whatsapp text-xl"></i> Finalizar Cotización
                </button>
            </div>
        </div>
    </footer>

    <script>
        const products = [
            { name: "Sol-Ark 30Kw 3P Industrial", price: 475629.00, img: "Sol-Ark_30Kw_3P.png" },
            { name: "Sol-Ark 15Kw + 4 LiFePO4 20Kw", price: 298643.09, img: "Sol-Ark_15Kw_4LiFePO4_20Kw.png" },
            { name: "KIT HYBRID 8K SOL-ARK Premium", price: 247852.95, img: "KITHYBRID8KSOL-h.jpg" },
            { name: "Sol-Ark 15Kw 48V-220VCA", price: 201164.30, img: "Sol-Ark_15Kw_48V-220VCA.png" },
            { name: "Sol-Ark 12K2P-p", price: 171308.80, img: "12K2P-p-SOL-ARK.png" },
            { name: "Lux Power 12Kw + 3 LiFePO4 15Kw", price: 163995.06, img: "Lux_Power_12Kw_3LiFePO4-15Kw.png" },
            { name: "Sol-Ark 8Kw 48V", price: 124107.86, img: "8Kw_48V_SOL-ARK.png" },
            { name: "Batería Pytes 48v 11.7 Kw", price: 64343.75, img: "Bateria Pytes 48v 11.7 Kw.png" },
            { name: "EPCOM RES200 10K", price: 59632.35, img: "RES20010K-p.png" },
            { name: "Growatt SPF 6000T DVM-G2", price: 57425.51, img: "SPF6000TDVMG2-p.png" },
            { name: "Pytes Litio 48v 5.1 Kw", price: 35757.42, img: "Bateria de litio Pytes 48v 5.1 Kw.jpg" },
            { name: "Pytes EBOX 48100R", price: 35757.41, img: "EBOX48100R-p.png" },
            { name: "Growatt AXE 5.0LC1", price: 35420.00, img: "AXE5.0LC1-p.png" },
            { name: "RLB10048 PRO", price: 28154.77, img: "RLB10048PRO-p.png" },
            { name: "Batería Must 48V 5.1 Kw", price: 27629.72, img: "Bateria-Must-48V-5.1-Kw-LiFePO4.png" },
            { name: "EPCOM RES100 2KW", price: 26658.08, img: "RES1005K-p.png" },
            { name: "Growatt SPF 3000TL LVM-48P", price: 23199.58, img: "SPF3000TLLVM48P-p.png" },
            { name: "RLB10048 MAX", price: 22054.57, img: "RLB10048MAX-p.png" },
            { name: "Growatt SPF 3000TL LVM-ES", price: 18805.46, img: "SPF3000TLLVMES-Growatt_48V_110v.png" },
            { name: "KIT 8PV VEKTOR 8R", price: 12973.35, img: "KIT8PVEKTOR8R-p.png" },
            { name: "Panel Solar 700W LP210", price: 6015.05, img: "LP210210M66NB700W-p.png" },
            { name: "Panel Solar EPL540M144", price: 5935.84, img: "EPL540M144-p.png" },
            { name: "Panel Solar EPL440M144", price: 4810.21, img: "EPL450M144-p.png" },
            { name: "Accesorio PL16ACD", price: 3684.58, img: "PL16ACD-p.png" }
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('grid');
            grid.innerHTML = products.map((p, index) => {
                const discountedPrice = p.price * 0.90;
                return `
                <div class="product-card glass-card rounded-[2rem] p-6 flex flex-col group">
                    <div class="relative mb-6 overflow-hidden rounded-2xl bg-white p-4 h-48 flex items-center justify-center">
                        <img src="${p.img}" alt="${p.name}" class="max-h-full transition-transform duration-500 group-hover:scale-110">
                    </div>
                    <h3 class="text-white font-bold text-sm h-10 line-clamp-2 mb-4 group-hover:text-amber-400 transition-colors">${p.name}</h3>
                    <div class="mb-6 bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                        <span class="block text-slate-500 text-[10px] line-through">$${p.price.toLocaleString('en-US')}</span>
                        <div class="flex items-end gap-1">
                            <span class="text-xl font-black text-green-400">$${discountedPrice.toLocaleString('en-US', {minimumFractionDigits: 2})}</span>
                            <span class="text-[9px] text-slate-500 italic pb-1">MXN</span>
                        </div>
                    </div>
                    <button class="w-full bg-amber-400 hover:bg-amber-300 text-slate-900 font-black py-4 rounded-xl transition-all mt-auto shadow-lg active:scale-95" onclick="addToCart(${index})">
                        AGREGAR AL CARRITO
                    </button>
                </div>
            `}).join('');
        }

        function addToCart(index) {
            cart.push(products[index]);
            updateCart();
        }

        function updateCart() {
            const count = cart.length;
            const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
            const totalWithDiscount = subtotal * 0.90;
            const savings = subtotal - totalWithDiscount;

            document.getElementById('cartCount').innerText = count;
            document.getElementById('cartTotal').innerText = `$${totalWithDiscount.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
            document.getElementById('cartSavings').innerText = `$${savings.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
            
            checkForm();
        }

        function checkForm() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const addr = document.getElementById('custAddress').value;
            document.getElementById('sendWpp').disabled = !(name && phone && addr && cart.length > 0);
        }

        document.querySelectorAll('input').forEach(input => input.addEventListener('keyup', checkForm));

        function sendToWhatsapp() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const addr = document.getElementById('custAddress').value;
            const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
            const total = subtotal * 0.90;
            const savings = subtotal - total;

            let itemsSummary = {};
            cart.forEach(item => { itemsSummary[item.name] = (itemsSummary[item.name] || 0) + 1; });

            let listString = "";
            for (let item in itemsSummary) { listString += `%0A- ${itemsSummary[item]}x ${item}`; }
            
            const message = `*SOLICITUD DE COTIZACIÓN (PROMO 10%)*%0A%0A` +
                            `👤 *Cliente:* ${name}%0A` +
                            `📞 *Teléfono:* ${phone}%0A` +
                            `📍 *Ubicación:* ${addr}%0A%0A` +
                            `📦 *Equipos Solicitados:*${listString}%0A%0A` +
                            `💰 *Precio Lista:* $${subtotal.toLocaleString('en-US')}%0A` +
                            `✨ *Descuento Aplicado:* -$${savings.toLocaleString('en-US')}%0A` +
                            `✅ *Total Final:* $${total.toLocaleString('en-US')} MXN%0A%0A` +
                            `_Precios sujetos a +16% de IVA. Válido hasta 30 de Junio, 2026_`;

            window.open(`https://wa.me/5216122198325?text=${message}`, '_blank');
        }

        function filter() {
            let val = document.getElementById('searchBar').value.toLowerCase();
            document.querySelectorAll('.product-card').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(val) ? "flex" : "none";
            });
        }

        renderProducts();
    </script>
</body>
</html>
