<index.html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Solar | BAJA PRO SERVICES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .bg-baja { background-color: #004aad; }
        .text-baja { color: #004aad; }
        input[type="checkbox"]:checked + div { border-color: #004aad; background-color: #f0f7ff; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <nav class="bg-white shadow-md py-4 sticky top-0 z-50">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="text-2xl font-black tracking-tighter text-baja">BAJA <span class="text-slate-800">PRO SERVICES</span></div>
            <div class="bg-orange-500 text-white text-[10px] font-bold px-3 py-1 rounded-full animate-pulse">10% OFF PROMO</div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-10">
        <div class="flex flex-col lg:flex-row gap-8">
            
            <div class="lg:w-2/3">
                <div class="bg-white rounded-3xl p-8 shadow-xl">
                    <h1 class="text-3xl font-extrabold text-slate-800 mb-2">Calculadora de Paneles</h1>
                    <p class="text-slate-500 mb-8">Selecciona tus equipos para estimar el tamaño de tu planta solar.</p>
                    
                    <div id="grid-equipos" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        </div>
                </div>
            </div>

            <div class="lg:w-1/3">
                <div class="bg-slate-900 rounded-3xl p-8 text-white sticky top-24 shadow-2xl border border-slate-700">
                    <h2 class="text-xl font-bold mb-6 text-blue-400 uppercase tracking-widest">Resultado Estimado</h2>
                    
                    <div class="mb-10 text-center">
                        <div id="panel-count" class="text-8xl font-black text-white leading-none">0</div>
                        <div class="text-blue-400 font-bold mt-2 uppercase">Paneles de 550W</div>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="text-xs text-slate-400 uppercase ml-1">Tu Nombre</label>
                            <input type="text" id="nombre" placeholder="Ej. Juan Pérez" class="w-full bg-slate-800 border-none rounded-2xl p-4 mt-1 focus:ring-2 focus:ring-blue-500 outline-none text-white">
                        </div>
                        <div>
                            <label class="text-xs text-slate-400 uppercase ml-1">Ubicación</label>
                            <select id="zona" class="w-full bg-slate-800 border-none rounded-2xl p-4 mt-1 focus:ring-2 focus:ring-blue-500 outline-none text-white">
                                <option>La Paz, BCS</option>
                                <option>Todos Santos</option>
                                <option>Pescadero</option>
                                <option>La Ribera</option>
                            </select>
                        </div>

                        <button onclick="enviarWhatsApp()" class="w-full bg-green-500 hover:bg-green-400 text-slate-900 font-black py-5 rounded-2xl transition-all flex items-center justify-center gap-3 mt-4">
                            <i class="fab fa-whatsapp text-2xl"></i>
                            RECIBIR COTIZACIÓN
                        </button>
                        
                        <p class="text-[10px] text-center text-slate-500 mt-4 leading-relaxed">
                            Vigencia: 30 Junio 2026. Precios + 16% IVA.<br>
                            Ubicación: Rosaura Zapata 2730, La Paz.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const equipos = [
            { n: "Mini-Split 1.0 Ton", w: 1100, i: "fa-snowflake" },
            { n: "Mini-Split 1.5 Tons", w: 1650, i: "fa-snowflake" },
            { n: "Mini-Split 2.0 Tons", w: 2200, i: "fa-snowflake" },
            { n: "Refrigerador Side-by-Side", w: 350, i: "fa-columns" },
            { n: "Cava de Vinos", w: 150, i: "fa-wine-bottle" },
            { n: "Parrilla de Inducción", w: 4500, i: "fa-bolt" },
            { n: "Horno Eléctrico", w: 2800, i: "fa-fire-burner" },
            { n: "Lavavajillas", w: 1400, i: "fa-faucet-drip" },
            { n: "Microondas Pro", w: 1300, i: "fa-square" },
            { n: "Cafetera Espresso", w: 1450, i: "fa-mug-hot" },
            { n: "Air Fryer", w: 1600, i: "fa-wind" },
            { n: "Lavadora Carga Frontal", w: 900, i: "fa-soap" },
            { n: "Secadora Eléctrica", w: 5200, i: "fa-wind" },
            { n: "Bomba de Alberca", w: 1500, i: "fa-water" },
            { n: "Cargador Auto Eléctrico", w: 7400, i: "fa-car-side" },
            { n: "Hidroneumático", w: 1100, i: "fa-faucet" },
            { n: "Calentador Eléctrico", w: 4500, i: "fa-hot-tub-person" },
            { n: "Pantalla OLED 75+", w: 350, i: "fa-tv" },
            { n: "Home Theater", w: 500, i: "fa-volume-high" },
            { n: "Computadora Gamer", w: 800, i: "fa-gamepad" },
            { n: "Secador de Cabello", w: 1900, i: "fa-wind" },
            { n: "Cámaras de Seguridad", w: 100, i: "fa-video" },
            { n: "Portón Eléctrico", w: 400, i: "fa-door-open" },
            { n: "Licuadora Pro", w: 1200, i: "fa-blender" },
            { n: "Aspiradora Robot", w: 60, i: "fa-robot" }
        ];

        const grid = document.getElementById('grid-equipos');
        let wattsTotales = 0;

        equipos.forEach((eq, idx) => {
            const card = document.createElement('label');
            card.className = "relative cursor-pointer";
            card.innerHTML = `
                <input type="checkbox" class="hidden peer" onchange="calcular()">
                <div class="flex items-center gap-4 p-4 rounded-2xl border-2 border-slate-100 bg-slate-50 peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all">
                    <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center shadow-sm text-slate-400 peer-checked:text-blue-600">
                        <i class="fas ${eq.i} text-lg"></i>
                    </div>
                    <div class="flex-1">
                        <h4 class="text-sm font-bold text-slate-700">${eq.n}</h4>
                        <p class="text-[10px] text-slate-400 uppercase tracking-tighter">${eq.w} Watts</p>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });

        function calcular() {
            wattsTotales = 0;
            const checks = document.querySelectorAll('input[type="checkbox"]');
            checks.forEach((ck, i) => {
                if(ck.checked) wattsTotales += equipos[i].w;
            });
            
            // Factor Baja California Sur: Watts / 1150 (ajustado a eficiencia y sol local)
            const paneles = Math.ceil(wattsTotales / 1150);
            document.getElementById('panel-count').innerText = wattsTotales > 0 ? paneles : 0;
        }

        function enviarWhatsApp() {
            const nombre = document.getElementById('nombre').value;
            const zona = document.getElementById('zona').value;
            const paneles = document.getElementById('panel-count').innerText;
            
            if(!nombre) return alert("Por favor escribe tu nombre");
            if(paneles == 0) return alert("Selecciona tus equipos");

            const msg = `*NUEVA SOLICITUD SOLAR*%0A` +
                        `--------------------------%0A` +
                        `👤 *Cliente:* ${nombre}%0A` +
                        `📍 *Zona:* ${zona}%0A` +
                        `⚡ *Carga:* ${wattsTotales}W%0A` +
                        `☀️ *Paneles:* ${paneles} módulos 550W%0A` +
                        `--------------------------%0A` +
                        `*BAJA PRO SERVICES* - Promo 10% OFF`;

            window.open(`https://wa.me/5216122198325?text=${msg}`, '_blank');
            window.location.href = "gracias.html";
        }
    </script>
</body>
</html>
